<!DOCTYPE html>
<html>
<head>
    <title>⚡ CSS Buttons</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #020c06;
            min-height: 100vh;
            color: white;
            padding: 60px 40px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,128,0.03) 2px, rgba(0,255,128,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,255,128,0.02) 2px, rgba(0,255,128,0.02) 4px);
            z-index: 0; pointer-events: none;
        }
        .page-header, .btn-grid { position: relative; z-index: 1; }

        .page-header { text-align: center; margin-bottom: 48px; }
        .page-tag { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; color: rgba(0,255,128,0.45); margin-bottom: 10px; }
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px; font-weight: 700;
            color: #00ff80;
            text-shadow: 0 0 10px #00ff80, 0 0 30px #00ffcc;
            letter-spacing: 3px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            width: 100%; max-width: 860px;
        }
        .btn-card {
            background: rgba(0, 20, 10, 0.85);
            border: 1px solid rgba(0, 255, 128, 0.25);
            border-radius: 4px;
            padding: 22px 24px;
            display: flex; flex-direction: column; gap: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .btn-card::before, .btn-card::after {
            content: ''; position: absolute;
            width: 8px; height: 8px;
            border-color: #00ff80; border-style: solid;
        }
        .btn-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
        .btn-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
        .btn-card:hover { border-color: rgba(0,255,128,0.5); box-shadow: 0 0 20px rgba(0,255,128,0.1); }
        .btn-brand { font-size: 11px; letter-spacing: 3px; color: #00ff80; text-transform: uppercase; }
        .btn-desc  { font-size: 12px; color: rgba(0,255,128,0.35); font-style: italic; }

        .uberbutton        { background:#000; border:none; color:#fff; padding:11px 24px; font-size:14px; cursor:pointer; font-family:inherit; border-radius:6px; }
        .amazonbutton      { background:rgb(255,216,20); border:none; color:#000; padding:11px 24px; font-size:14px; border-radius:49px; cursor:pointer; font-family:inherit; }
        .githubbutton      { background:rgb(46,164,79); border:none; color:#fff; padding:11px 24px; font-size:14px; border-radius:8px; font-weight:bold; cursor:pointer; font-family:inherit; }
        .bootstrapbutton   { background:rgb(121,82,179); border:none; color:#fff; padding:11px 24px; font-size:14px; font-weight:bold; border-radius:8px; cursor:pointer; font-family:inherit; }
        .bootstrap2button  { background:#fff; border:1px solid rgb(108,117,125); color:rgb(108,117,125); padding:11px 24px; font-size:14px; font-weight:bold; border-radius:8px; cursor:pointer; font-family:inherit; }
        .linkedinbutton    { background:rgb(10,102,194); border:none; color:#fff; padding:11px 24px; font-size:14px; font-weight:bold; border-radius:49px; cursor:pointer; font-family:inherit; }
        .linkedin2button   { background:#fff; border:2px solid rgb(10,102,194); color:rgb(10,102,194); padding:11px 24px; font-size:14px; font-weight:bold; border-radius:49px; cursor:pointer; font-family:inherit; }
    </style>
</head>
<body>
    <div class="page-header">
        <p class="page-tag">// Activity 2</p>
        <h1 class="page-title">CSS BASIC BUTTONS</h1>
    </div>

    <div class="btn-grid">
        <div class="btn-card">
            <span class="btn-brand">Uber</span>
            <span class="btn-desc">Ride-hailing CTA</span>
            <button class="uberbutton">Request now</button>
        </div>
        <div class="btn-card">
            <span class="btn-brand">Amazon</span>
            <span class="btn-desc">E-commerce CTA</span>
            <button class="amazonbutton">Add to cart</button>
        </div>
        <div class="btn-card">
            <span class="btn-brand">GitHub</span>
            <span class="btn-desc">Developer platform</span>
            <button class="githubbutton">Sign up</button>
        </div>
        <div class="btn-card">
            <span class="btn-brand">Bootstrap</span>
            <span class="btn-desc">Primary action</span>
            <button class="bootstrapbutton">Get started</button>
        </div>
        <div class="btn-card">
            <span class="btn-brand">Bootstrap Alt</span>
            <span class="btn-desc">Secondary action</span>
            <button class="bootstrap2button">Download</button>
        </div>
        <div class="btn-card">
            <span class="btn-brand">LinkedIn</span>
            <span class="btn-desc">Job application</span>
            <button class="linkedinbutton">Apply on company website</button>
        </div>
        <div class="btn-card">
            <span class="btn-brand">LinkedIn Alt</span>
            <span class="btn-desc">Save for later</span>
            <button class="linkedin2button">Save</button>
        </div>
    </div>
</body>
</html>
