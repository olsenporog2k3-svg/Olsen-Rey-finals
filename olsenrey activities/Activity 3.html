<!DOCTYPE html>
<html>
<head>
    <title>⚡ Hover & Transition</title>
    <link rel="stylesheet" type="text/css" href="3.css">
</head>
<body>

    <div class="page-header">
        <p class="page-tag">// Activity 3</p>
        <h1 class="page-title">HOVER, SHADOW & TRANSITION</h1>
    </div>

    <div class="btn-list">
        <div class="btn-row">
            <span class="btn-brand">Uber</span>
            <span class="btn-desc">Hover: darken background</span>
            <button class="uberbutton">Request now</button>
        </div>
        <div class="btn-row">
            <span class="btn-brand">Amazon</span>
            <span class="btn-desc">Hover: darker yellow</span>
            <button class="amazonbutton">Add to cart</button>
        </div>
        <div class="btn-row">
            <span class="btn-brand">GitHub</span>
            <span class="btn-desc">Hover: drop shadow</span>
            <button class="githubbutton">Sign up</button>
        </div>
        <div class="btn-row">
            <span class="btn-brand">Bootstrap</span>
            <span class="btn-desc">Hover: darker purple</span>
            <button class="bootstrapbutton">Get started</button>
        </div>
        <div class="btn-row">
            <span class="btn-brand">Bootstrap Alt</span>
            <span class="btn-desc">Hover: fill grey</span>
            <button class="bootstrap2button">Download</button>
        </div>
        <div class="btn-row">
            <span class="btn-brand">LinkedIn</span>
            <span class="btn-desc">Hover: darker blue</span>
            <button class="linkedinbutton">Apply on company website</button>
        </div>
        <div class="btn-row">
            <span class="btn-brand">LinkedIn Alt</span>
            <span class="btn-desc">Hover: fill blue</span>
            <button class="linkedin2button">Save</button>
        </div>
    </div>

</body>
</html>
