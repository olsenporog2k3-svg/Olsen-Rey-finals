<!DOCTYPE html>
<html>
<head>
    <title>⚡ Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #020c06;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,128,0.03) 2px, rgba(0,255,128,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,255,128,0.02) 2px, rgba(0,255,128,0.02) 4px);
            pointer-events: none;
        }
        .login-box {
            position: relative; z-index: 1;
            background: rgba(0, 20, 10, 0.85);
            border: 1px solid rgba(0, 255, 128, 0.35);
            border-radius: 4px;
            padding: 44px 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,255,128,0.1), 0 0 80px rgba(0,255,128,0.05);
        }
        .login-box::before, .login-box::after {
            content: ''; position: absolute;
            width: 12px; height: 12px;
            border-color: #00ff80; border-style: solid;
        }
        .login-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .login-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .login-box .icon { font-size: 32px; margin-bottom: 12px; }
        .login-box h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; margin-bottom: 6px;
            color: #00ff80;
            text-shadow: 0 0 10px #00ff80, 0 0 30px #00ffcc;
            letter-spacing: 3px;
        }
        .login-box p { color: rgba(0,255,128,0.45); font-size: 12px; margin-bottom: 28px; letter-spacing: 2px; }
        .login-box input {
            width: 100%; padding: 12px 16px; margin-bottom: 14px;
            border-radius: 2px; border: 1px solid rgba(0,255,128,0.25);
            background: rgba(0,255,128,0.04); color: #00ff80;
            font-size: 13px; outline: none; transition: border 0.3s, box-shadow 0.3s;
            font-family: inherit; letter-spacing: 1px;
        }
        .login-box input::placeholder { color: rgba(0,255,128,0.3); }
        .login-box input:focus { border-color: #00ff80; box-shadow: 0 0 10px rgba(0,255,128,0.2); }
        .login-box button {
            width: 100%; padding: 13px;
            background: transparent;
            color: #00ff80; font-weight: bold; font-size: 14px;
            border: 1px solid #00ff80; border-radius: 2px; cursor: pointer;
            transition: all 0.3s; font-family: inherit; letter-spacing: 3px;
            text-shadow: 0 0 8px #00ff80;
            box-shadow: 0 0 10px rgba(0,255,128,0.15), inset 0 0 10px rgba(0,255,128,0.05);
        }
        .login-box button:hover {
            background: rgba(0,255,128,0.1);
            box-shadow: 0 0 25px rgba(0,255,128,0.35), inset 0 0 20px rgba(0,255,128,0.08);
        }
        .login-box .link { margin-top: 18px; font-size: 12px; color: rgba(0,255,128,0.4); letter-spacing: 1px; }
        .login-box .link a { color: #00ff80; text-decoration: none; font-weight: bold; text-shadow: 0 0 8px #00ff80; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">⚡</div>
        <h1>ACCESS SYSTEM</h1>
        <p>// enter your credentials</p>
        <input type="text" placeholder="Username or Email">
        <input type="password" placeholder="Password">
        <button>LOGIN</button>
        <div class="link">No account? <a href="#">Sign up</a></div>
    </div>
</body>
</html>
